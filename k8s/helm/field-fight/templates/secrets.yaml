{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "field-fight.secretName" . }}
  labels:
    {{- include "field-fight.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:%v/%s" (required "database.user is required" .Values.database.user) ((required "database.password is required" .Values.database.password) | urlquery) (required "database.host is required" .Values.database.host) .Values.database.port (required "database.name is required" .Values.database.name) | quote }}
  JWT_SECRET: {{ required "auth.jwtSecret is required" .Values.auth.jwtSecret | quote }}
  GOOGLE_CLIENT_ID: {{ .Values.auth.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.auth.googleClientSecret | quote }}
  GITHUB_CLIENT_ID: {{ .Values.auth.githubClientId | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.auth.githubClientSecret | quote }}
{{- end }}
