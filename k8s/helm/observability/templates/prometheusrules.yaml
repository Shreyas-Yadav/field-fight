apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: field-fight-app-alerts
  labels:
    release: {{ .Release.Name | quote }}
    app.kubernetes.io/part-of: field-fight
spec:
  groups:
    - name: field-fight-app.rules
      rules:
        - alert: FieldFightPodRestarting
          expr: increase(kube_pod_container_status_restarts_total{namespace="{{ .Values.fieldFight.namespace }}"}[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Field Fight pod restarted"
            description: "A Field Fight container restarted in the last 15 minutes."
        - alert: FieldFightDeploymentUnavailable
          expr: kube_deployment_status_replicas_available{namespace="{{ .Values.fieldFight.namespace }}", deployment=~"{{ .Values.fieldFight.releaseName }}-.*"} < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Field Fight deployment unavailable"
            description: "A Field Fight deployment has no available replicas."
        - alert: FieldFightLeaderboardServerErrors
          expr: sum(rate(leaderboard_request_duration_seconds_count{status_code=~"5.."}[5m])) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Leaderboard API is returning server errors"
            description: "The leaderboard API has returned 5xx responses in the last 5 minutes."
        - alert: FieldFightMatchHistoryServerErrors
          expr: sum(rate(match_history_request_duration_seconds_count{status_code=~"5.."}[5m])) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Match history service is returning server errors"
            description: "The match history service has returned 5xx responses in the last 5 minutes."
        - alert: FieldFightGameSocketErrors
          expr: increase(game_socket_errors_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Game server socket errors detected"
            description: "The game server has recorded socket handler errors."
