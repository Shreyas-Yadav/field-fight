apiVersion: v1
kind: ConfigMap
metadata:
  name: field-fight-app-dashboard
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: field-fight
data:
  field-fight-app.json: |
    {
      "uid": "field-fight-app",
      "title": "Field Fight App",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "type": "stat",
          "title": "Players Online",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "targets": [
            { "expr": "game_players_online", "legendFormat": "players" }
          ]
        },
        {
          "type": "stat",
          "title": "Active Rooms",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "targets": [
            { "expr": "game_rooms_active", "legendFormat": "rooms" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Leaderboard Request Rate",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "targets": [
            { "expr": "sum by (route, status_code) (rate(leaderboard_request_duration_seconds_count[5m]))", "legendFormat": "{{ "{{" }}route{{ "}}" }} {{ "{{" }}status_code{{ "}}" }}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Match History Request Rate",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "targets": [
            { "expr": "sum by (route, status_code) (rate(match_history_request_duration_seconds_count[5m]))", "legendFormat": "{{ "{{" }}route{{ "}}" }} {{ "{{" }}status_code{{ "}}" }}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Leaderboard p95 Latency",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 14 },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum by (le, route) (rate(leaderboard_request_duration_seconds_bucket[5m])))", "legendFormat": "{{ "{{" }}route{{ "}}" }}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Match History p95 Latency",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 14 },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum by (le, route) (rate(match_history_request_duration_seconds_bucket[5m])))", "legendFormat": "{{ "{{" }}route{{ "}}" }}" }
          ]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: field-fight-logs-dashboard
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: field-fight
data:
  field-fight-logs.json: |
    {
      "uid": "field-fight-logs",
      "title": "Field Fight Logs",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "type": "logs",
          "title": "Backend Logs",
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 0 },
          "targets": [
            { "expr": "{namespace=\"{{ .Values.fieldFight.namespace }}\"}", "datasource": { "type": "loki", "uid": "loki" } }
          ]
        }
      ]
    }
