name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 55432:5432
        env:
          POSTGRES_DB: magnet_vis
          POSTGRES_USER: magnet_vis
          POSTGRES_PASSWORD: magnet_vis_password
        options: >-
          --health-cmd "pg_isready -U magnet_vis -d magnet_vis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install API test dependencies
        run: |
          npm ci --prefix migrations
          npm ci --prefix auth-service
          npm ci --prefix leaderboard-api
          npm ci --prefix match-history-service
          npm ci --prefix tests

      - name: Run API tests
        run: npm test --prefix tests
        env:
          TEST_DATABASE_URL: postgres://magnet_vis:magnet_vis_password@127.0.0.1:55432/magnet_vis

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  terraform-checks:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        stack:
          - terraform/ecr
          - terraform/environments/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: terraform fmt -check
        run: terraform -chdir=${{ matrix.stack }} fmt -check -recursive

      - name: terraform init -backend=false
        run: terraform -chdir=${{ matrix.stack }} init -backend=false

      - name: terraform validate
        run: terraform -chdir=${{ matrix.stack }} validate

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - frontend-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: game-server
            context: ./game-server
          - service: leaderboard-api
            context: ./leaderboard-api
          - service: auth-service
            context: ./auth-service
          - service: match-history-service
            context: ./match-history-service
          - service: migrations
            context: ./migrations

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: false
          tags: local/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
