name: Phase 3 Image Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX || 'field-fight' }}

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 55432:5432
        env:
          POSTGRES_DB: magnet_vis
          POSTGRES_USER: magnet_vis
          POSTGRES_PASSWORD: magnet_vis_password
        options: >-
          --health-cmd "pg_isready -U magnet_vis -d magnet_vis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install API test dependencies
        run: |
          npm ci --prefix migrations
          npm ci --prefix auth-service
          npm ci --prefix leaderboard-api
          npm ci --prefix match-history-service
          npm ci --prefix tests

      - name: Run API tests
        run: npm test --prefix tests
        env:
          TEST_DATABASE_URL: postgres://magnet_vis:magnet_vis_password@127.0.0.1:55432/magnet_vis

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - frontend-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: game-server
            context: ./game-server
          - service: leaderboard-api
            context: ./leaderboard-api
          - service: auth-service
            context: ./auth-service
          - service: match-history-service
            context: ./match-history-service
          - service: migrations
            context: ./migrations

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: false
          tags: local/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  publish-ecr:
    name: Publish Images to ECR
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - frontend-build
    if: github.event_name != 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: game-server
            context: ./game-server
          - service: leaderboard-api
            context: ./leaderboard-api
          - service: auth-service
            context: ./auth-service
          - service: match-history-service
            context: ./match-history-service
          - service: migrations
            context: ./migrations

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
