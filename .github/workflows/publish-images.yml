name: Publish Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX || 'field-fight' }}

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 55432:5432
        env:
          POSTGRES_DB: magnet_vis
          POSTGRES_USER: magnet_vis
          POSTGRES_PASSWORD: magnet_vis_password
        options: >-
          --health-cmd "pg_isready -U magnet_vis -d magnet_vis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install API test dependencies
        run: |
          npm ci --prefix migrations
          npm ci --prefix auth-service
          npm ci --prefix leaderboard-api
          npm ci --prefix match-history-service
          npm ci --prefix tests

      - name: Run API tests
        run: npm test --prefix tests
        env:
          TEST_DATABASE_URL: postgres://magnet_vis:magnet_vis_password@127.0.0.1:55432/magnet_vis

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  publish-ecr:
    name: Publish Images to ECR
    runs-on: ubuntu-latest
    needs:
      - api-tests
      - frontend-build

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: game-server
            context: ./game-server
          - service: leaderboard-api
            context: ./leaderboard-api
          - service: auth-service
            context: ./auth-service
          - service: match-history-service
            context: ./match-history-service
          - service: migrations
            context: ./migrations

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login to Amazon ECR
        id: ecr
        run: |
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${registry}"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  promote-dev:
    name: Promote Dev GitOps Image Tag
    runs-on: ubuntu-latest
    needs:
      - publish-ecr
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Update dev image tag
        id: update
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          values_file="gitops/environments/dev/values.yaml"
          current_tag="$(awk -F': ' '/^imageTag:/ { print $2; exit }' "${values_file}")"

          if [ "${current_tag}" = "${IMAGE_TAG}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Dev imageTag is already ${IMAGE_TAG}."
            exit 0
          fi

          sed -i "s/^imageTag: .*/imageTag: ${IMAGE_TAG}/" "${values_file}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit dev promotion
        if: steps.update.outputs.changed == 'true'
        run: |
          short_sha="${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/environments/dev/values.yaml
          git commit -m "chore(gitops): promote dev to ${short_sha} [skip ci]"
          git push
