server {
    listen 80;

    # SPA routing — serve index.html for all unknown paths
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to backend services (use container names from docker-compose.yml)
    location /api/ {
        proxy_pass http://magnet-leaderboard-api:3000;
        proxy_set_header Host $host;
    }

    location /auth/ {
        proxy_pass http://magnet-auth-service:3000;
        proxy_set_header Host $host;
    }

    location /matches {
        proxy_pass http://magnet-match-history:3000;
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        proxy_pass http://magnet-game-server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
