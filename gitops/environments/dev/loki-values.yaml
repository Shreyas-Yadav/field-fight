# Loki values for the dev cluster.
# Single-binary deployment with filesystem (ephemeral) storage — fine for the
# AWS Builder Lab. Production should switch to S3 backend.

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h  # 7 days

singleBinary:
  replicas: 1
  persistence:
    enabled: false  # ephemeral; production should set true with a storageClass
  resources:
    requests:
      cpu: 100m
      memory: 250Mi
    limits:
      memory: 500Mi

# Disable the components we don't need in single-binary mode.
chunksCache:
  enabled: false
resultsCache:
  enabled: false
gateway:
  enabled: false
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# Disable the canary/test pods to save resources.
test:
  enabled: false
lokiCanary:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
  serviceMonitor:
    enabled: true  # let Prometheus scrape Loki itself
