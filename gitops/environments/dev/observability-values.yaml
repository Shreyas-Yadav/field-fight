# Values for the kube-prometheus-stack Helm chart, dev environment.
# Phase 5a: metrics core (no external HTTPS, no OAuth, no Slack alerts).
# Phase 5c will add ingress, OAuth, and Alertmanager Slack receiver.

fullnameOverride: field-fight-monitoring

# Disable add-ons that don't work in EKS managed control plane (kubelet
# doesn't expose these in the same way). Avoids pods stuck in Pending.
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

# Allow ServiceMonitors created outside this Helm release to be picked up.
# We deploy our own ServiceMonitors via a separate ArgoCD Application as
# raw YAML, and Prometheus needs to discover them.
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    retention: 24h
    resources:
      requests:
        cpu: 100m
        memory: 400Mi
      limits:
        memory: 1Gi
    # Ephemeral storage — fine for dev. Production should use a PVC.
    storageSpec: {}

alertmanager:
  enabled: true
  alertmanagerSpec:
    retention: 24h
    resources:
      requests:
        cpu: 20m
        memory: 50Mi

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  service:
    type: ClusterIP

  # Admin password is irrelevant once GitHub OAuth is the only login path,
  # but we still set one so the bootstrap doesn't break.
  adminPassword: bootstrap-only-not-used-for-login
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 150Mi

  # Loki as an additional data source so the Explore tab can query logs.
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://field-fight-loki.observability.svc.cluster.local:3100
      jsonData:
        timeout: 60
        maxLines: 1000

  # Phase 5c: HTTPS via shared ALB ingress group + GitHub OAuth.
  ingress:
    enabled: true
    ingressClassName: alb
    hosts:
      - grafana-dev.shri.software
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/group.name: field-fight
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:272772901676:certificate/afdcf64a-b8ac-4eb3-81cd-a1f949092f48

  # Read OAuth credentials from the K8s Secret created by `recreate-dev.sh secrets`.
  envFromSecret: grafana-oauth

  grafana.ini:
    server:
      root_url: https://grafana-dev.shri.software
      domain: grafana-dev.shri.software
    auth:
      disable_login_form: true       # block password login per rubric
      oauth_auto_login: true
    auth.basic:
      enabled: false
    auth.github:
      enabled: true
      allow_sign_up: true
      scopes: user:email
      auth_url: https://github.com/login/oauth/authorize
      token_url: https://github.com/login/oauth/access_token
      api_url: https://api.github.com/user
      client_id: $__env{GF_AUTH_GITHUB_CLIENT_ID}
      client_secret: $__env{GF_AUTH_GITHUB_CLIENT_SECRET}
      # Grant the Admin role to whoever passes OAuth. We removed the
      # allowed_organizations check because the lab uses a personal GitHub
      # account (not an org). For a real production setup, restrict via
      # allowed_organizations or team_ids.
      role_attribute_path: "'Admin'"

# Alertmanager: route everything to a Slack receiver. Webhook URL is taken
# from the K8s Secret created by `recreate-dev.sh secrets`.
alertmanager:
  enabled: true
  alertmanagerSpec:
    retention: 24h
    resources:
      requests:
        cpu: 20m
        memory: 50Mi
    secrets:
      - alertmanager-slack
  config:
    global:
      resolve_timeout: 5m
      slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack/slack_webhook_url
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'slack'
    receivers:
      - name: 'slack'
        slack_configs:
          - channel: '#alerts'
            send_resolved: true
            title: '{{ .Status | toUpper }} - {{ .CommonLabels.alertname }}'
            text: |-
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              Severity: `{{ .Labels.severity }}`
              Namespace: `{{ .Labels.namespace }}`
              {{ end }}

kube-state-metrics:
  resources:
    requests:
      cpu: 20m
      memory: 50Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 20m
      memory: 30Mi
