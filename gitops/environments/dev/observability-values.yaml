fieldFight:
  namespace: field-fight-dev
  releaseName: field-fight-dev
  services:
    - auth-service
    - leaderboard-api
    - match-history-service
    - game-server

grafana:
  hostname: grafana-dev.shri.software

kube-prometheus-stack:
  fullnameOverride: field-fight-monitoring

  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeProxy:
    enabled: false

  grafana:
    enabled: true
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    envFromSecret: grafana-oauth
    grafana.ini:
      server:
        root_url: https://grafana-dev.shri.software
      auth:
        disable_login_form: true
      auth.github:
        enabled: true
        allow_sign_up: true
        client_id: $__env{GF_AUTH_GITHUB_CLIENT_ID}
        client_secret: $__env{GF_AUTH_GITHUB_CLIENT_SECRET}
        scopes: user:email
        auth_url: https://github.com/login/oauth/authorize
        token_url: https://github.com/login/oauth/access_token
        api_url: https://api.github.com/user
        allowed_users: $__env{GF_AUTH_GITHUB_ALLOWED_USERS}
    ingress:
      enabled: false
      ingressClassName: alb
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
        alb.ingress.kubernetes.io/ssl-redirect: "443"
        alb.ingress.kubernetes.io/certificate-arn: ""
      hosts:
        - grafana-dev.shri.software
      path: /
    sidecar:
      dashboards:
        enabled: true
        searchNamespace: monitoring
      datasources:
        enabled: true
    additionalDataSources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://field-fight-loki-gateway.monitoring.svc.cluster.local

  prometheus:
    prometheusSpec:
      retention: 2d
      scrapeInterval: 30s
      evaluationInterval: 30s
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 750m
          memory: 1Gi

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

loki:
  fullnameOverride: field-fight-loki
  deploymentMode: SingleBinary
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      type: filesystem
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false

promtail:
  fullnameOverride: field-fight-promtail
  config:
    clients:
      - url: http://field-fight-loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
