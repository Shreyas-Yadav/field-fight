apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: field-fight-qa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Shreyas-Yadav/field-fight.git
    targetRevision: main
    path: k8s/helm/field-fight
    helm:
      releaseName: field-fight-qa
      valueFiles:
        - ../../../gitops/environments/qa/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: field-fight-qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
